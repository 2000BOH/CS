<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>테스트 페이지</h1>
  <div id="result"></div>
  
  <script src="config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const result = document.getElementById('result');
      
      // Supabase 로드 확인
      if (window.supabase) {
        result.innerHTML = '<p style="color: green;">✅ Supabase CDN 로드 성공!</p>';
        console.log('Supabase:', window.supabase);
        
        // USERS 확인
        if (typeof USERS !== 'undefined') {
          result.innerHTML += '<p style="color: green;">✅ config.js 로드 성공!</p>';
          console.log('USERS:', USERS);
        } else {
          result.innerHTML += '<p style="color: red;">❌ config.js 로드 실패!</p>';
        }
        
        // Supabase 클라이언트 생성 테스트
        try {
          const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          result.innerHTML += '<p style="color: green;">✅ Supabase 클라이언트 생성 성공!</p>';
          console.log('Supabase Client:', supabase);
        } catch (err) {
          result.innerHTML += '<p style="color: red;">❌ Supabase 클라이언트 생성 실패: ' + err.message + '</p>';
        }
      } else {
        result.innerHTML = '<p style="color: red;">❌ Supabase CDN 로드 실패!</p>';
      }
    });
  </script>
</body>
</html>
